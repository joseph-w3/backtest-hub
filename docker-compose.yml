version: "3.8"

services:
  backtest-hub:
    build: .
    container_name: backtest-hub
    ports:
      - "10033:10033"
    environment:
      HOST_API_KEY: ${HOST_API_KEY:-abcc}
      BACKTEST_API_BASES: ${BACKTEST_API_BASES:-http://100.65.27.118:10001,http://100.97.194.7:10001}
      BACKTEST_BRONZE_API_BASES: ${BACKTEST_BRONZE_API_BASES:-http://100.97.194.7:10001}
      BACKTEST_SUBMIT_PATH: ${BACKTEST_SUBMIT_PATH:-/v1/scripts/run_backtest}
      BACKTEST_RUNS_PATH: ${BACKTEST_RUNS_PATH:-/v1/runs}
      # Don't use a docker-compose default here: `{backtest_id}` conflicts with `${...}` parsing.
      # Leave it empty unless explicitly provided; app.py will apply its own default.
      BACKTEST_LOGS_PATH: ${BACKTEST_LOGS_PATH-}
      BACKTEST_API_KEY: ${BACKTEST_API_KEY:-}
      BACKTEST_METRICS_PATH: ${BACKTEST_METRICS_PATH:-v1/system/metrics}
      BACKTEST_METRICS_TIMEOUT_SECONDS: ${BACKTEST_METRICS_TIMEOUT_SECONDS:-3}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-*}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-600}
      DATA_MOUNT_PATH: ${DATA_MOUNT_PATH:-/opt/backtest}
      RUN_STORAGE_PATH: ${RUN_STORAGE_PATH:-/opt/backtest/runs}
      HUB_DB_PATH: ${HUB_DB_PATH:-/opt/backtest/hub.sqlite3}
      RUN_MAPPING_PATH: ${RUN_MAPPING_PATH:-/opt/backtest/run_mapping.json}
      QUEUE_PATH: ${QUEUE_PATH:-/opt/backtest/submit_queue.json}
      BACKTEST_RUNNER_PATH: ${BACKTEST_RUNNER_PATH:-/app/scripts/run_backtest.py}
      MAX_SYMBOLS: ${MAX_SYMBOLS:-150}
      MAX_RANGE_DAYS: ${MAX_RANGE_DAYS:-90}
      MAX_RUNNING_BACKTESTS: ${MAX_RUNNING_BACKTESTS:-10}
      # Per-worker max running override. Format: "http://host1:port=5,http://host2:port=3"
      # Workers not listed fall back to MAX_RUNNING_BACKTESTS.
      MAX_RUNNING_PER_WORKER: ${MAX_RUNNING_PER_WORKER:-}
      QUEUE_POLL_INTERVAL_SECONDS: ${QUEUE_POLL_INTERVAL_SECONDS:-3}
      MEMORY_PER_SYMBOL_GB: ${MEMORY_PER_SYMBOL_GB:-2.5}
      BRONZE_PAIRS_THRESHOLD: ${BRONZE_PAIRS_THRESHOLD:-6}
    volumes:
      - ./data:/opt/backtest
    restart: unless-stopped
